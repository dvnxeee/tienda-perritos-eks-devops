services:
  db:
    build:
      context: ./db
    container_name: tienda-db
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: tienda_perritos
    ports:
      - "3306:3306"
    volumes:
      - tienda_db_data:/var/lib/mysql
    networks:
      - tienda-network

  backend:
    build:
      context: ./backend
    container_name: tienda-backend
    environment:
      PORT: 3001
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: admin123
      DB_NAME: tienda_perritos
      DB_PORT: 3306
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3001:3001"
    depends_on:
      - db
    networks:
      - tienda-network

  frontend:
    build:
      context: ./frontend
    container_name: tienda-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - tienda-network

volumes:
  tienda_db_data:

networks:
  tienda-network:
    driver: bridge
